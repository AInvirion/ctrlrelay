# ctrlrelay orchestrator configuration
# Copy to orchestrator.yaml and customize

version: "1"
node_id: "my-machine"
timezone: "America/Santiago"

paths:
  state_db: "~/.ctrlrelay/state.db"
  worktrees: "~/.ctrlrelay/worktrees"
  bare_repos: "~/.ctrlrelay/repos"
  contexts: "~/.ctrlrelay/contexts"
  skills: "~/.ctrlrelay/claude-config/skills"

claude:
  binary: "claude"
  default_timeout_seconds: 1800
  output_format: "json"

transport:
  type: "telegram"
  telegram:
    bot_token_env: "CTRLRELAY_TELEGRAM_TOKEN"
    chat_id: 61259010
    socket_path: "~/.ctrlrelay/ctrlrelay.sock"
  file_mock:
    inbox: "~/.ctrlrelay/inbox.txt"
    outbox: "~/.ctrlrelay/outbox.txt"

dashboard:
  enabled: false
  url: "https://ctrlrelay-dashboard.example.com"
  auth_token_env: "CTRLRELAY_DASHBOARD_TOKEN"

repos:
  - name: "AInvirion/ctrlrelay"
    local_path: "~/Projects/ctrlrelay"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "AInvirion/cliquey"
    local_path: "~/Projects/AINVIRION/cliquey"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "AInvirion/AgentJunior"
    local_path: "~/Projects/AINVIRION/AgentJunior"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "AInvirion/aiproxyguard-cloud"
    local_path: "~/Projects/AINVIRION/AIProxyGuard/cloud"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "SemClone/kenos-orchestrator"
    local_path: "~/Projects/SEMCL.ONE/kenos-orchestrator"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "oscarvalenzuelab/open_agentic_framework"
    local_path: "~/Projects/PERSONAL/open_agentic_framework"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
