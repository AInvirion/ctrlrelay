# dev-sync orchestrator configuration
# Copy to orchestrator.yaml and customize

version: "1"
node_id: "my-machine"
timezone: "America/Santiago"

paths:
  state_db: "~/.dev-sync/state.db"
  worktrees: "~/.dev-sync/worktrees"
  bare_repos: "~/.dev-sync/repos"
  contexts: "~/dev-sync/contexts"
  skills: "~/dev-sync/claude-config/skills"

claude:
  binary: "claude"
  default_timeout_seconds: 1800
  output_format: "json"

transport:
  type: "file_mock"  # Use "telegram" for production
  telegram:
    bot_token_env: "DEV_SYNC_TELEGRAM_TOKEN"
    chat_id: 123456789
    socket_path: "~/.dev-sync/dev-sync.sock"
  file_mock:
    inbox: "~/.dev-sync/inbox.txt"
    outbox: "~/.dev-sync/outbox.txt"

dashboard:
  enabled: false
  url: "https://dev-sync-dashboard.example.com"
  auth_token_env: "DEV_SYNC_DASHBOARD_TOKEN"

repos:
  - name: "AInvirion/dev-sync"
    local_path: "~/Projects/dev-sync"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "AInvirion/cliquey"
    local_path: "~/Projects/AINVIRION/cliquey"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "AInvirion/AgentJunior"
    local_path: "~/Projects/AINVIRION/AgentJunior"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "AInvirion/aiproxyguard-cloud"
    local_path: "~/Projects/AINVIRION/AIProxyGuard/cloud"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "SemClone/kenos-orchestrator"
    local_path: "~/Projects/SEMCL.ONE/kenos-orchestrator"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
  - name: "oscarvalenzuelab/open_agentic_framework"
    local_path: "~/Projects/PERSONAL/open_agentic_framework"
    automation:
      dependabot_patch: auto
      dependabot_minor: ask
      dependabot_major: never
