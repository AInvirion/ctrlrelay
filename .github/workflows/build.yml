name: Build Python distribution

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: List built artifacts
        run: ls -la dist/

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "Uploading dist/* to release ${TAG}"
          gh release upload "${TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber

  e2e-install:
    name: Install built wheel and smoke-test the CLI
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download built distribution
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Run e2e install check against built wheel
        run: |
          WHEEL="$(ls dist/ctrlrelay-*.whl | head -n1)"
          if [ -z "${WHEEL}" ]; then
            echo "No wheel found in dist/" >&2
            ls -la dist/ >&2
            exit 1
          fi
          echo "Using wheel: ${WHEEL}"
          WHEEL="${WHEEL}" bash scripts/e2e_install_check.sh
